name: 🧠 Build AI Index

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'README*'
      - 'CHANGELOG*'
      - 'doc/**'
      - 'docs/**'
      - 'src/**'
      - 'lib/**'
      - 'app/**'
      - 'packages/**'
permissions:
  contents: write

concurrency:
  group: ai-build-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-index:
    if: vars.AI_INDEX_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      AI_USE_TRUE_EMBEDDING: ${{ vars.AI_USE_TRUE_EMBEDDING || 'false' }}
      AI_INDEX_MAX_FILES: ${{ vars.AI_INDEX_MAX_FILES || '1200' }}
      AI_INDEX_MAX_CHUNK_CHARS: ${{ vars.AI_INDEX_MAX_CHUNK_CHARS || '1800' }}
      AI_INDEX_COMMIT_RESULTS: ${{ vars.AI_INDEX_COMMIT_RESULTS || 'true' }}
      AI_EMBED_BATCH_SIZE: ${{ vars.AI_EMBED_BATCH_SIZE || '8' }}
      AI_EMBED_USER_AGENT: ${{ vars.AI_EMBED_USER_AGENT || 'curl/8.7.1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ai

      - name: Build lightweight AI index
        shell: bash
        run: |
          set -euo pipefail

          python3 .github/scripts/build_ai_index.py \
            --repo-root . \
            --out ai/index.jsonl \
            --manifest ai/index_manifest.json \
            --max-files "${AI_INDEX_MAX_FILES}" \
            --max-chunk-chars "${AI_INDEX_MAX_CHUNK_CHARS}"

      - name: Probe embedding endpoint with curl
        if: env.AI_USE_TRUE_EMBEDDING == 'true' && github.event_name != 'push'
        shell: bash
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
        run: |
          set -euo pipefail

          echo "[probe-curl] base_url=${EMBEDDING_BASE_URL}"
          echo "[probe-curl] final_url=${EMBEDDING_BASE_URL%/}/embeddings"
          echo "[probe-curl] model=${EMBEDDING_MODEL}"
          echo "[probe-curl] user_agent=${AI_EMBED_USER_AGENT}"

          HTTP_CODE=$(curl -sS -o /tmp/embed_probe_body.txt -w "%{http_code}" \
            "${EMBEDDING_BASE_URL%/}/embeddings" \
            -H "Authorization: Bearer ${EMBEDDING_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: ${AI_EMBED_USER_AGENT}" \
            --data "{\"model\":\"${EMBEDDING_MODEL}\",\"input\":[\"hello world\"]}" || true)

          echo "[probe-curl] http_code=${HTTP_CODE}"
          if [[ ! "${HTTP_CODE}" =~ ^2[0-9][0-9]$ ]]; then
            echo "[probe-curl] response_preview:"
            sed -n '1,40p' /tmp/embed_probe_body.txt || true
          fi

      - name: Probe embedding endpoint with Python
        if: env.AI_USE_TRUE_EMBEDDING == 'true' && github.event_name != 'push'
        shell: bash
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          url = os.environ['EMBEDDING_BASE_URL'].rstrip('/') + '/embeddings'
          body = json.dumps({
              'model': os.environ['EMBEDDING_MODEL'],
              'input': ['hello world'],
          }).encode('utf-8')
          headers = {
              'Authorization': f"Bearer {os.environ['EMBEDDING_API_KEY']}",
              'Content-Type': 'application/json',
              'Accept': 'application/json',
              'User-Agent': os.environ.get('AI_EMBED_USER_AGENT', 'curl/8.7.1'),
          }

          print(f"[probe-py] url={url}")

          req = urllib.request.Request(url, data=body, headers=headers, method='POST')
          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  _ = resp.read()
                  print(f"[probe-py] status={getattr(resp, 'status', 'unknown')}")
          except urllib.error.HTTPError as e:
              text = e.read().decode('utf-8', errors='replace')
              print(f"[probe-py] status={e.code}")
              print(text[:600])
              raise
          PY

      - name: Build true embedding index
        if: env.AI_USE_TRUE_EMBEDDING == 'true' && github.event_name != 'push'
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${EMBEDDING_API_KEY}" ] || [ -z "${EMBEDDING_BASE_URL}" ] || [ -z "${EMBEDDING_MODEL}" ]; then
            echo "Embedding secrets are missing."
            exit 1
          fi

          python3 .github/scripts/build_ai_index.py \
            --repo-root . \
            --out ai/index.jsonl \
            --manifest ai/index_manifest.json \
            --embedding-out ai/embeddings.jsonl \
            --embedding-api-key "${EMBEDDING_API_KEY}" \
            --embedding-base-url "${EMBEDDING_BASE_URL}" \
            --embedding-model "${EMBEDDING_MODEL}" \
            --embedding-user-agent "${AI_EMBED_USER_AGENT}" \
            --embed-batch-size "${AI_EMBED_BATCH_SIZE}" \
            --max-files "${AI_INDEX_MAX_FILES}" \
            --max-chunk-chars "${AI_INDEX_MAX_CHUNK_CHARS}"

      - name: Remove stale embedding file when disabled
        if: env.AI_USE_TRUE_EMBEDDING != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f ai/embeddings.jsonl

      - name: Show summary
        if: always()
        shell: bash
        run: |
          {
            echo "## AI Index Build"
            echo ""
            echo "- True embedding enabled: ${AI_USE_TRUE_EMBEDDING}"
            echo "- Max files: ${AI_INDEX_MAX_FILES}"
            echo "- Max chunk chars: ${AI_INDEX_MAX_CHUNK_CHARS}"
            echo "- Embed batch size: ${AI_EMBED_BATCH_SIZE}"
            echo "- Embed user-agent: ${AI_EMBED_USER_AGENT}"
            echo ""
            echo "### Files"
            ls -lah ai || true
            echo ""
            echo "### Manifest"
            echo '```json'
            cat ai/index_manifest.json 2>/dev/null || echo '{}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated AI index
        if: env.AI_INDEX_COMMIT_RESULTS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ai/index.jsonl ai/index_manifest.json
          if [ -f ai/embeddings.jsonl ]; then
            git add ai/embeddings.jsonl
          fi

          if git diff --cached --quiet; then
            echo "No index changes"
            exit 0
          fi

          git commit -m "chore(ai): update repository knowledge index"
          git push
